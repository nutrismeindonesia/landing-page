<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nutrisme Backend Test</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 20px;line-height:1.5}
    input,button{font:inherit;padding:12px;border-radius:8px;border:1px solid #bbb}
    input{width:100%;box-sizing:border-box}button{margin-top:12px;cursor:pointer}
    pre{white-space:pre-wrap;background:#f5f5f5;padding:16px;border-radius:8px;min-height:90px}
  </style>
</head>
<body>
  <h1>Nutrisme Backend Test</h1>
  <p>URL ini hanya memeriksa koneksi dan tidak menambah baris ke Spreadsheet.</p>
  <input id="url" value="https://script.google.com/macros/s/AKfycbw_s5tVPnAdL40dTvAlDaKbe0hHwHrUevlHvWjIlTdlC3t02jR-7Dvn_4QbhjSCjcPx/exec" aria-label="Apps Script URL">
  <button id="test">Cek koneksi</button>
  <pre id="result">Belum diuji.</pre>
  <script>
    document.getElementById('test').onclick=()=>{
      const out=document.getElementById('result');
      const url=document.getElementById('url').value.trim();
      const cb='nutrismeHealth_'+Date.now();
      const s=document.createElement('script');
      const timer=setTimeout(()=>{cleanup();out.textContent='TIMEOUT: deployment tidak merespons atau akses bukan Anyone.'},15000);
      function cleanup(){clearTimeout(timer);s.remove();try{delete window[cb]}catch(e){window[cb]=undefined}}
      window[cb]=(data)=>{cleanup();out.textContent=JSON.stringify(data,null,2)};
      s.onerror=()=>{cleanup();out.textContent='GAGAL: URL tidak dapat dimuat.'};
      s.src=url+'?action=health&callback='+encodeURIComponent(cb)+'&_='+Date.now();
      document.head.appendChild(s);
      out.textContent='Memeriksa...';
    };
  </script>
</body>
</html>
